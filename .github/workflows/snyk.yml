name: Snyk Monitor Scanning
on:
  release:
    types: [published]
  push:
    branches:
      - 'main'
      - 'master'
      - 'release-[0-9]+.[0-9]+.x'
  workflow_dispatch:

jobs:
  snyk-scan-ci:
    uses: 'grafana/security-github-actions/.github/workflows/snyk_monitor.yml@a7ed27abb504c69482026be6e6312f42240a26b5' # ratchet:grafana/security-github-actions/.github/workflows/snyk_monitor.yml@main
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
