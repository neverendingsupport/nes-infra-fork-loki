name: Helm weekly release PR

on:
  schedule:
    - cron: '0 10 * * 2' # 10 UTC every Tuesday (since ks get cut on Monday)

  workflow_dispatch: # for manual testing

permissions:
  contents: "read"
  id-token: "write"
  pull-requests: "write"

jobs:
  weekly-release-pr:
    runs-on: ubuntu-latest
    env:
      BUILD_IN_CONTAINER: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - uses: gabe565/setup-helm-docs-action@d5c35bdc9133cfbea3b671acadf50a29029e87c2 # ratchet:gabe565/setup-helm-docs-action@v1
        with:
          version: v1.11.2

      - id: "get_github_app_token"
        name: "get github app token"
        uses: "actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547" # ratchet:actions/create-github-app-token@v1
        with:
          app-id: "${{ secrets.APP_ID }}"
          owner: "${{ github.repository_owner }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY }}"

      - name: "Login to DockerHub (from vault)"
        uses: "grafana/shared-workflows/actions/dockerhub-login@c40cd34c3b8982cf51cad94f0b339ff447ab2cc2" # ratchet:grafana/shared-workflows/actions/dockerhub-login@main

      - uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # ratchet:imjasonh/setup-crane@v0.4

      - name: Update/regenerate files for standard release
        id: update
        run: |
          bash .github/workflows/scripts/helm-weekly-release.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # ratchet:peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.get_github_app_token.outputs.token }}
          title: "chore: release loki helm chart ${{ steps.update.outputs.new_chart_version }}"
          body: Automated PR created by [helm-weekly-release-pr.yaml](https://github.com/grafana/loki/blob/main/.github/workflows/helm-weekly-release-pr.yaml)
          commit-message: Update loki chart to ${{ steps.update.outputs.new_chart_version }}
          branch: helm-chart-weekly-${{ steps.update.outputs.new_chart_version }}
          base: main
          labels: helm
