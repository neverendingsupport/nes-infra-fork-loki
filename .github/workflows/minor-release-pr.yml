concurrency:
  group: "create-release-pr-${{ github.sha }}"
env:
  BUILD_ARTIFACTS_BUCKET: "loki-build-artifacts"
  BUILD_TIMEOUT: 60
  CHANGELOG_PATH: "CHANGELOG.md"
  DOCKER_USERNAME: "grafana"
  DRY_RUN: false
  IMAGE_PREFIX: "grafana"
  RELEASE_LIB_REF: "main"
  RELEASE_REPO: "grafana/loki"
  SKIP_VALIDATION: false
  USE_GITHUB_APP_TOKEN: true
  VERSIONING_STRATEGY: "always-bump-minor"
jobs:
  check:
    uses: "grafana/loki-release/.github/workflows/check.yml@4b7a188be1678d6682b0dae055d6bc6811b1a1ca" # ratchet:grafana/loki-release/.github/workflows/check.yml@main
    with:
      build_image: "grafana/loki-build-image:0.34.6"
      golang_ci_lint_version: "v1.64.5"
      release_lib_ref: "main"
      skip_validation: false
      use_github_app_token: true
  create-release-pr:
    needs:
      - "dist"
      - "fluent-bit"
      - "fluentd"
      - "logcli"
      - "logstash"
      - "loki"
      - "loki-canary"
      - "loki-canary-boringcrypto"
      - "loki-docker-driver"
      - "promtail"
      - "querytee"
    runs-on: "ubuntu-latest"
    steps:
      - name: "pull code to release"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "release"
          repository: "${{ env.RELEASE_REPO }}"
      - name: "pull release library code"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "lib"
          ref: "${{ env.RELEASE_LIB_REF }}"
          repository: "grafana/loki-release"
      - name: "setup node"
        uses: "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020" # ratchet:actions/setup-node@v4
        with:
          node-version: 20
      - id: "extract_branch"
        name: "extract branch name"
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        working-directory: "release"
      - id: "get_github_app_token"
        if: "${{ fromJSON(env.USE_GITHUB_APP_TOKEN) }}"
        name: "get github app token"
        uses: "actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547" # ratchet:actions/create-github-app-token@v1
        with:
          app-id: "${{ secrets.APP_ID }}"
          owner: "${{ github.repository_owner }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY }}"
      - id: "github_app_token"
        name: "set github token"
        run: |
          if [[ "${USE_GITHUB_APP_TOKEN}" == "true" ]]; then
            echo "token=${{ steps.get_github_app_token.outputs.token }}" >> $GITHUB_OUTPUT
          else
            echo "token=${{ secrets.GH_TOKEN }}" >> $GITHUB_OUTPUT
          fi
      - env:
          SHA: "${{ github.sha }}"
        id: "release"
        name: "release please"
        run: |
          npm install
          npm exec -- release-please release-pr \
            --changelog-path "${CHANGELOG_PATH}" \
            --consider-all-branches \
            --group-pull-request-title-pattern "chore\${scope}: release\${component} \${version}" \
            --label "backport main,autorelease: pending,product-approved" \
            --manifest-file .release-please-manifest.json \
            --pull-request-footer "Merging this PR will release the [artifacts](https://console.cloud.google.com/storage/browser/${BUILD_ARTIFACTS_BUCKET}/${SHA}) of ${SHA}" \
            --pull-request-title-pattern "chore\${scope}: release\${component} \${version}" \
            --release-as "${{ needs.dist.outputs.version }}" \
            --release-type simple \
            --repo-url "${{ env.RELEASE_REPO }}" \
            --separate-pull-requests false \
            --target-branch "${{ steps.extract_branch.outputs.branch }}" \
            --token "${{ steps.github_app_token.outputs.token }}" \
            --dry-run ${{ fromJSON(env.DRY_RUN) }}

        working-directory: "lib"
  dist:
    needs:
      - "version"
    outputs:
      version: "${{ needs.version.outputs.version }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "clean up build tools cache"
        run: "rm -rf /opt/hostedtoolcache"
      - name: "pull code to release"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "release"
          repository: "${{ env.RELEASE_REPO }}"
      - name: "auth gcs"
        uses: "google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed" # ratchet:google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}"
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f" # ratchet:google-github-actions/setup-gcloud@v2
        with:
          version: ">= 452.0.0"
      - id: "get-secrets"
        name: "get nfpm signing keys"
        uses: "grafana/shared-workflows/actions/get-vault-secrets@c40cd34c3b8982cf51cad94f0b339ff447ab2cc2" # ratchet:grafana/shared-workflows/actions/get-vault-secrets@main
        with:
          common_secrets: |
            NFPM_SIGNING_KEY=packages-gpg:private-key
            NFPM_PASSPHRASE=packages-gpg:passphrase
      - env:
          BUILD_IN_CONTAINER: false
          DRONE_TAG: "${{ needs.version.outputs.version }}"
          IMAGE_TAG: "${{ needs.version.outputs.version }}"
          NFPM_SIGNING_KEY_FILE: "nfpm-private-key.key"
          SKIP_ARM: false
        if: "${{ fromJSON(needs.version.outputs.pr_created) }}"
        name: "build artifacts"
        run: |
          cat <<EOF | docker run \
            --interactive \
            --env BUILD_IN_CONTAINER \
            --env DRONE_TAG \
            --env IMAGE_TAG \
            --env NFPM_PASSPHRASE \
            --env NFPM_SIGNING_KEY \
            --env NFPM_SIGNING_KEY_FILE \
            --env SKIP_ARM \
            --volume .:/src/loki \
            --workdir /src/loki \
            --entrypoint /bin/sh "grafana/loki-build-image:0.34.6"
            git config --global --add safe.directory /src/loki
            echo "${NFPM_SIGNING_KEY}" > $NFPM_SIGNING_KEY_FILE
            if echo "grafana/loki-build-image:0.34.6" | grep -q "golang"; then
              /src/loki/.github/vendor/github.com/grafana/loki-release/workflows/install_workflow_dependencies.sh dist
            fi
            make dist packages
          EOF
        working-directory: "release"
      - if: "${{ fromJSON(needs.version.outputs.pr_created) }}"
        name: "upload artifacts"
        uses: "google-github-actions/upload-cloud-storage@c0f6160ff80057923ff50e5e567695cea181ec23" # ratchet:google-github-actions/upload-cloud-storage@v2
        with:
          destination: "${{ env.BUILD_ARTIFACTS_BUCKET }}/${{ github.sha }}"
          path: "release/dist"
          process_gcloudignore: false
  fluent-bit:
    needs:
      - "version"
    runs-on: "${{ matrix.runs_on }}"
    steps:
      - name: "pull release library code"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "lib"
          ref: "${{ env.RELEASE_LIB_REF }}"
          repository: "grafana/loki-release"
      - name: "pull code to release"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "release"
          repository: "${{ env.RELEASE_REPO }}"
      - name: "setup node"
        uses: "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020" # ratchet:actions/setup-node@v4
        with:
          node-version: 20
      - name: "auth gcs"
        uses: "google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed" # ratchet:google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}"
      - name: "Set up Docker buildx"
        uses: "docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f" # ratchet:docker/setup-buildx-action@v3
      - id: "platform"
        name: "Parse image platform"
        run: |
          mkdir -p images

          platform="$(echo "${{ matrix.arch }}" | sed "s/\(.*\)\/\(.*\)/\1-\2/")"
          echo "platform=${platform}" >> $GITHUB_OUTPUT
          echo "platform_short=$(echo ${{ matrix.arch }} | cut -d / -f 2)" >> $GITHUB_OUTPUT
        working-directory: "release"
      - env:
          IMAGE_TAG: "${{ needs.version.outputs.version }}"
        if: "${{ fromJSON(needs.version.outputs.pr_created) }}"
        name: "Build and export"
        timeout-minutes: "${{ fromJSON(env.BUILD_TIMEOUT) }}"
        uses: "docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8" # ratchet:docker/build-push-action@v6
        with:
          build-args: "IMAGE_TAG=${{ needs.version.outputs.version }}"
          context: "release"
          file: "release/clients/cmd/fluent-bit/Dockerfile"
          outputs: "type=docker,dest=release/images/fluent-bit-plugin-loki-${{ needs.version.outputs.version}}-${{ steps.platform.outputs.platform }}.tar"
          platforms: "${{ matrix.arch }}"
          tags: "${{ env.IMAGE_PREFIX }}/fluent-bit-plugin-loki:${{ needs.version.outputs.version }}-${{ steps.platform.outputs.platform_short }}"
      - if: "${{ fromJSON(needs.version.outputs.pr_created) }}"
        name: "Upload artifacts"
        uses: "google-github-actions/upload-cloud-storage@c0f6160ff80057923ff50e5e567695cea181ec23" # ratchet:google-github-actions/upload-cloud-storage@v2
        with:
          destination: "${{ env.BUILD_ARTIFACTS_BUCKET }}/${{ github.sha }}/images"
          path: "release/images/fluent-bit-plugin-loki-${{ needs.version.outputs.version}}-${{ steps.platform.outputs.platform }}.tar"
          process_gcloudignore: false
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: "linux/amd64"
            runs_on:
              - "github-hosted-ubuntu-x64-small"
