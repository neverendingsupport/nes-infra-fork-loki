  version:
    needs:
      - "check"
    outputs:
      pr_created: "${{ steps.version.outputs.pr_created }}"
      version: "${{ steps.version.outputs.version }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "pull release library code"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "lib"
          ref: "${{ env.RELEASE_LIB_REF }}"
          repository: "grafana/loki-release"
      - name: "pull code to release"
        uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # ratchet:actions/checkout@v4
        with:
          path: "release"
          repository: "${{ env.RELEASE_REPO }}"
      - name: "setup node"
        uses: "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020" # ratchet:actions/setup-node@v4
        with:
          node-version: 20
      - id: "extract_branch"
        name: "extract branch name"
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        working-directory: "release"
      - id: "get_github_app_token"
        if: "${{ fromJSON(env.USE_GITHUB_APP_TOKEN) }}"
        name: "get github app token"
        uses: "actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547" # ratchet:actions/create-github-app-token@v1
        with:
          app-id: "${{ secrets.APP_ID }}"
          owner: "${{ github.repository_owner }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY }}"
      - id: "github_app_token"
        name: "set github token"
        run: |
          if [[ "${USE_GITHUB_APP_TOKEN}" == "true" ]]; then
            echo "token=${{ steps.get_github_app_token.outputs.token }}" >> $GITHUB_OUTPUT
          else
            echo "token=${{ secrets.GH_TOKEN }}" >> $GITHUB_OUTPUT
          fi
      - id: "version"
        name: "get release version"
        run: "npm install\n\nif [[ -z \"${{ env.RELEASE_AS }}\" ]]; then\n  npm exec -- release-please release-pr \\\n    --consider-all-branches \\\n    --dry-run \\\n    --dry-run-output release.json \\\n    --group-pull-request-title-pattern \"chore\\${scope}: release\\${component} \\${version}\" \\\n    --manifest-file .release-please-manifest.json \\\n    --pull-request-title-pattern \"chore\\${scope}: release\\${component} \\${version}\" \\\n    --release-type simple \\\n    --repo-url \"${{ env.RELEASE_REPO }}\" \\\n    --separate-pull-requests false \\\n    --target-branch \"${{ steps.extract_branch.outputs.branch }}\" \\\n    --token \"${{ steps.github_app_token.outputs.token }}\" \\\n    --versioning-strategy \"${{ env.VERSIONING_STRATEGY }}\"\nelse\n  npm exec -- release-please release-pr \\\n    --consider-all-branches \\\n    --dry-run \\\n    --dry-run-output release.json \\\n    --group-pull-request-title-pattern \"chore\\${scope}: release\\${component} \\${version}\" \\\n    --manifest-file .release-please-manifest.json \\\n    --pull-request-title-pattern \"chore\\${scope}: release\\${component} \\${version}\" \\\n    --release-type simple \\\n    --repo-url \"${{ env.RELEASE_REPO }}\" \\\n    --separate-pull-requests false \\\n    --target-branch \"${{ steps.extract_branch.outputs.branch }}\" \\\n    --token \"${{ steps.github_app_token.outputs.token }}\" \\\n    --release-as \"${{ env.RELEASE_AS }}\"\nfi\n\ncat release.json\n\nif [[ `jq length release.json` -gt 1 ]]; then \n  echo 'release-please would create more than 1 PR, so cannot determine correct version'\n  echo \"pr_created=false\" >> $GITHUB_OUTPUT\n  exit 1\nfi\n\nif [[ `jq length release.json` -eq 0 ]]; then \n  echo \"pr_created=false\" >> $GITHUB_OUTPUT\nelse\n  version=\"$(npm run --silent get-version)\"\n  echo \"Parsed version: ${version}\"\n  echo \"version=${version}\" >> $GITHUB_OUTPUT\n  echo \"pr_created=true\" >> $GITHUB_OUTPUT\nfi\n"
        working-directory: "lib"

name: "Prepare Minor Release PR from Weekly"
"on":
  push:
    branches:
      - "k[0-9]+"
permissions:
  contents: "write"
  id-token: "write"
  pull-requests: "write"














































