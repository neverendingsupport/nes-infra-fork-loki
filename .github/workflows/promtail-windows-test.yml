name: Promtail Windows Test
on:
  pull_request:
    branches: ["main", "k*", "release-[0-9]+.[0-9]+.x"]
  push:
    tags: ['v[0-9].[0-9]+.[0-9]+']
    branches: ["main", "k*", "release-[0-9]+.[0-9]+.x"]
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        go-version: ['1.22.12', '1.23.6', '1.24.0']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # ratchet:actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      # You can test your matrix by printing the current Go version
      - name: Display Go version
        run: go version
      - name: Run promtail tests
        run: go test .\clients\pkg\promtail\targets\windows\... -v
